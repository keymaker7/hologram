<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' blob: data:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    />
    <meta name="referrer" content="no-referrer" />
    <title>홀로그램 4면 생성기</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>홀로그램 4면 생성기</h1>
      <p class="desc">
        이미지 1장을 업로드하면 동/서/남/북 방향으로 동일 이미지를 배치합니다.
        스마트폰 화면을 최대 밝기로 두고, 피라미드 필름을 올려 재생하세요.
      </p>

      <section class="controls">
        <label class="file-input">
          <span>이미지 업로드</span>
          <input id="imageInput" type="file" accept="image/*" />
        </label>
        <p id="uploadMessage" class="upload-message" aria-live="polite"></p>

        <div class="sample-control">
          <span>샘플 빠른 테스트</span>
          <div class="sample-buttons">
            <button class="sample-btn" data-src="./samples/neon-bot-a.png" type="button">Neon Bot A</button>
            <button class="sample-btn" data-src="./samples/pastel-cat-a.png" type="button">Pastel Cat A</button>
            <button class="sample-btn" data-src="./samples/pastel-cat-b.png" type="button">Pastel Cat B</button>
            <button class="sample-btn" data-src="./samples/neon-bot-b.png" type="button">Neon Bot B</button>
          </div>
        </div>

        <label class="size-control">
          <span>크기: <strong id="sizeValue">140</strong>px</span>
          <input id="sizeRange" type="range" min="80" max="280" value="140" step="2" />
        </label>

        <label class="effect-control">
          <span>효과 모드</span>
          <select id="effectSelect">
            <option value="float" selected>기본 흔들림 (Float)</option>
            <option value="orbit">원형 회전 (Orbit)</option>
            <option value="pulse">맥박 확대 (Pulse)</option>
            <option value="wave">순차 웨이브 (Wave)</option>
            <option value="flicker">홀로그램 깜빡임 (Flicker)</option>
            <option value="vortex">소용돌이 (Vortex)</option>
            <option value="glitch">글리치 점프 (Glitch)</option>
          </select>
        </label>

        <label class="speed-control">
          <span>효과 속도: <strong id="speedValue">1.0</strong>x</span>
          <input id="speedRange" type="range" min="0.4" max="2.4" value="1.0" step="0.1" />
        </label>

        <label class="visibility-control">
          <span>표시 모드</span>
          <select id="visibilitySelect">
            <option value="always" selected>항상 표시</option>
            <option value="blink">주기 점멸 (ON/OFF)</option>
            <option value="sequential">순차 표시 (북→동→남→서)</option>
            <option value="random">랜덤 깜빡임</option>
          </select>
        </label>

        <label class="timing-control">
          <span>보임 시간: <strong id="onValue">1.0</strong>초</span>
          <input id="onRange" type="range" min="0.2" max="3.0" value="1.0" step="0.1" />
        </label>

        <label class="timing-control">
          <span>숨김 시간: <strong id="offValue">0.6</strong>초</span>
          <input id="offRange" type="range" min="0.1" max="3.0" value="0.6" step="0.1" />
        </label>
      </section>

      <section class="canvas-wrap">
        <div id="hologramCanvas" class="hologram-canvas">
          <img id="north" class="arm north" alt="북쪽 이미지" />
          <img id="east" class="arm east" alt="동쪽 이미지" />
          <img id="south" class="arm south" alt="남쪽 이미지" />
          <img id="west" class="arm west" alt="서쪽 이미지" />
          <div class="center-dot" aria-hidden="true"></div>
        </div>
      </section>

      <section class="preview-wrap">
        <h2>테스트 결과 예시 이미지</h2>
        <p class="preview-desc">아래는 샘플 이미지로 4면 홀로그램 배치를 미리 렌더링한 결과입니다.</p>
        <div class="preview-grid">
          <img src="./preview/hologram-neon-bot-a.png" alt="Neon Bot A 홀로그램 예시" />
          <img src="./preview/hologram-pastel-cat-a.png" alt="Pastel Cat A 홀로그램 예시" />
          <img src="./preview/hologram-pastel-cat-b.png" alt="Pastel Cat B 홀로그램 예시" />
          <img src="./preview/hologram-neon-bot-b.png" alt="Neon Bot B 홀로그램 예시" />
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
